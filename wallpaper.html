<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fouloscopie — Fond d'écran</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #04030e; }
    canvas { display: block; }
    #hint {
      position: fixed; bottom: 12px; right: 16px;
      font-size: 0.62rem; color: rgba(255,255,255,0.1);
      font-family: 'Segoe UI', sans-serif; pointer-events: none;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
<div id="hint">FOULOSCOPIE · fouloscopie.marlefebvre.com</div>
<script>
// ── Paramètres fixes (preset Étourneaux) ─────────────────────────
const MAX_N  = 1000;
const SEP_R  = 30,  SEP_W = 1.5;  // preset Défaut — identique à V2
const ALI_R  = 60,  ALI_W = 1.0;
const COH_R  = 100, COH_W = 1.0;
const SPEED  = 3.0;
const BIRD_SCALE = 0.55;

// ── SoA physique ─────────────────────────────────────────────────
const posX = new Float32Array(MAX_N);
const posY = new Float32Array(MAX_N);
const velX = new Float32Array(MAX_N);
const velY = new Float32Array(MAX_N);
const accX = new Float32Array(MAX_N);
const accY = new Float32Array(MAX_N);
let N = MAX_N;

// ── Grille spatiale ───────────────────────────────────────────────
const grid = {
  cells: new Map(), cs: 100,
  _k(cx, cy) { return (cx & 0x3FFF) | ((cy & 0x3FFF) << 14); },
  clear() { this.cells.clear(); },
  insert(i) {
    const k = this._k(Math.floor(posX[i]/this.cs), Math.floor(posY[i]/this.cs));
    let c = this.cells.get(k); if (!c) { c = []; this.cells.set(k, c); } c.push(i);
  }
};

// ── PIXI ──────────────────────────────────────────────────────────
let W = window.innerWidth, H = window.innerHeight;
const app = new PIXI.Application({
  width: W, height: H,
  backgroundColor: 0x04030e,
  antialias: false,
  powerPreference: 'high-performance',
  resolution: Math.min(window.devicePixelRatio || 1, 2),
  autoDensity: true,
});
document.body.insertBefore(app.view, document.body.firstChild);

// ── Textures ──────────────────────────────────────────────────────
function makeSkyTexture(W, H) {
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,    'rgb(52, 78, 118)');
  grad.addColorStop(0.20, 'rgb(92, 138, 172)');
  grad.addColorStop(0.42, 'rgb(155, 140, 98)');
  grad.addColorStop(0.62, 'rgb(208, 112, 38)');
  grad.addColorStop(0.82, 'rgb(210, 78, 18)');
  grad.addColorStop(1,    'rgb(175, 52, 10)');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  const glow = ctx.createRadialGradient(W*.5, H*.88, 0, W*.5, H*.88, W*.52);
  glow.addColorStop(0,   'rgba(255,175,55,0.28)');
  glow.addColorStop(0.35,'rgba(230,115,25,0.14)');
  glow.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);
  return PIXI.Texture.from(c);
}

function makeBirdTexture() {
  const c = document.createElement('canvas'); c.width = 32; c.height = 24;
  const ctx = c.getContext('2d');
  const cx = 16, cy = 12;
  ctx.fillStyle = 'white'; ctx.beginPath();
  ctx.moveTo(cx,     cy-9);  ctx.lineTo(cx+2.5, cy-2);
  ctx.lineTo(cx+11,  cy-5);  ctx.lineTo(cx+4.5, cy+3);
  ctx.lineTo(cx+2,   cy+7);  ctx.lineTo(cx,     cy+5.5);
  ctx.lineTo(cx-2,   cy+7);  ctx.lineTo(cx-4.5, cy+3);
  ctx.lineTo(cx-11,  cy-5);  ctx.lineTo(cx-2.5, cy-2);
  ctx.closePath(); ctx.fill();
  return PIXI.Texture.from(c);
}

// ── Scène ─────────────────────────────────────────────────────────
let skyTex = makeSkyTexture(W, H);
const skySprite = new PIXI.Sprite(skyTex);
skySprite.width = W; skySprite.height = H;
app.stage.addChild(skySprite);

const world = new PIXI.Container();
app.stage.addChild(world);



const birdContainer = new PIXI.ParticleContainer(MAX_N, {
  tint: true, position: true, rotation: true, scale: true, alpha: false,
});
world.addChild(birdContainer);

const birdTex = makeBirdTexture();
const sprites = [];
for (let i = 0; i < MAX_N; i++) {
  const sp = new PIXI.Sprite(birdTex);
  sp.anchor.set(0.5);
  sp.scale.set(BIRD_SCALE);
  birdContainer.addChild(sp);
  sprites.push(sp);
}

// ── Init boids ────────────────────────────────────────────────────
for (let i = 0; i < N; i++) {
  posX[i] = Math.random() * W; posY[i] = Math.random() * H;
  const a = Math.random() * Math.PI * 2;
  velX[i] = Math.cos(a) * SPEED; velY[i] = Math.sin(a) * SPEED;
}

// ── Souris ────────────────────────────────────────────────────────
let mX = -9999, mY = -9999, mTimer = 0;
document.addEventListener('mousemove', e => { mX = e.clientX; mY = e.clientY; mTimer = 80; });

// ── Physique ──────────────────────────────────────────────────────
function stepPhysics() {
  const sepR2 = SEP_R*SEP_R, aliR2 = ALI_R*ALI_R, cohR2 = COH_R*COH_R;
  const f = 0.09, cs = grid.cs;
  const mActive = mTimer > 0;
  const mFade = mTimer / 80;

  for (let i = 0; i < N; i++) {
    const px = posX[i], py = posY[i];
    const vx = velX[i], vy = velY[i];
    let sepX=0,sepY=0,sepCnt=0, aliX=0,aliY=0,aliCnt=0, cohX=0,cohY=0,cohCnt=0;

    const maxR = Math.max(SEP_R, ALI_R, COH_R);
    const x0 = Math.floor((px-maxR)/cs), x1 = Math.floor((px+maxR)/cs);
    const y0 = Math.floor((py-maxR)/cs), y1 = Math.floor((py+maxR)/cs);
    for (let cx = x0; cx <= x1; cx++) {
      for (let cy = y0; cy <= y1; cy++) {
        const cell = grid.cells.get(grid._k(cx, cy)); if (!cell) continue;
        for (let ci = 0; ci < cell.length; ci++) {
          const j = cell[ci]; if (j === i) continue;
          const dx = posX[j]-px, dy = posY[j]-py, d2 = dx*dx+dy*dy;
          if (d2 > 0.01 && d2 < sepR2) { sepX -= dx/d2; sepY -= dy/d2; sepCnt++; }
          if (d2 < aliR2) { aliX += velX[j]; aliY += velY[j]; aliCnt++; }
          if (d2 < cohR2) { cohX += posX[j]; cohY += posY[j]; cohCnt++; }
        }
      }
    }

    const steer = (mx, my, w, cap) => {
      const m = Math.sqrt(mx*mx+my*my); if (m < 0.0001) return [0,0];
      let sx = mx/m*SPEED - vx, sy = my/m*SPEED - vy;
      const sl = Math.sqrt(sx*sx+sy*sy);
      if (sl > cap) { const r = cap/sl; sx *= r; sy *= r; }
      return [sx*w, sy*w];
    };

    if (sepCnt > 0) { const [fx,fy] = steer(sepX/sepCnt, sepY/sepCnt, SEP_W, f);   accX[i]+=fx; accY[i]+=fy; }
    if (aliCnt > 0) { const [fx,fy] = steer(aliX/aliCnt, aliY/aliCnt, ALI_W, f);   accX[i]+=fx; accY[i]+=fy; }
    if (cohCnt > 0) { const [fx,fy] = steer(cohX/cohCnt-px, cohY/cohCnt-py, COH_W, f*0.6); accX[i]+=fx; accY[i]+=fy; }

    // Répulsion des bords — identique V2 (margin 18%, quadratique, pas de rebond)
    const margin = Math.min(W, H) * 0.18;
    const maxF = SPEED * 0.13;
    if (px < margin)     { const t = 1 - px/margin;       accX[i] += maxF * t * t; }
    if (px > W - margin) { const t = 1 - (W-px)/margin;  accX[i] -= maxF * t * t; }
    if (py < margin)     { const t = 1 - py/margin;       accY[i] += maxF * t * t; }
    if (py > H - margin) { const t = 1 - (H-py)/margin;  accY[i] -= maxF * t * t; }

    // Fuite douce de la souris
    if (mActive) {
      const dpx = px-mX, dpy = py-mY, d2 = dpx*dpx+dpy*dpy, R = 200;
      if (d2 < R*R && d2 > 0.01) {
        const d = Math.sqrt(d2), t = (1 - d/R) * mFade;
        const str = SPEED * 0.18 * t;
        accX[i] += dpx/d * str; accY[i] += dpy/d * str;
      }
    }
  }

  // Intégration + wrap
  for (let i = 0; i < N; i++) {
    velX[i] += accX[i]; velY[i] += accY[i];
    const vm = Math.sqrt(velX[i]*velX[i]+velY[i]*velY[i]);
    if (vm > SPEED) { const r = SPEED/vm; velX[i]*=r; velY[i]*=r; }
    posX[i] += velX[i]; posY[i] += velY[i];
    accX[i] = 0; accY[i] = 0;
    // Clamp silencieux (identique V2 — pas de rebond de vitesse)
    if (posX[i] < 0)  posX[i] = 0;  if (posX[i] > W) posX[i] = W;
    if (posY[i] < 0)  posY[i] = 0;  if (posY[i] > H) posY[i] = H;
  }

}

// ── Ticker ────────────────────────────────────────────────────────
let frameCount = 0;
app.ticker.add(() => {
  frameCount++;
  if (mTimer > 0) mTimer--;

  grid.cs = Math.max(Math.max(SEP_R, ALI_R, COH_R), 40);
  grid.clear();
  for (let i = 0; i < N; i++) grid.insert(i);
  stepPhysics();

  // Sync sprites
  for (let i = 0; i < N; i++) {
    const sp = sprites[i];
    sp.x = posX[i]; sp.y = posY[i];
    sp.rotation = Math.atan2(velY[i], velX[i]) + Math.PI * 0.5;
    sp.tint = 0x0d0d18; // silhouette sombre sur ciel crépuscule
  }

  // Scintillement subtil du ciel (variation de luminosité très légère)
  skySprite.alpha = 0.97 + 0.03 * Math.sin(frameCount * 0.003);
});

// ── Resize ────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  app.renderer.resize(W, H);
  skyTex.destroy(true);
  skyTex = makeSkyTexture(W, H);
  skySprite.texture = skyTex;
  skySprite.width = W; skySprite.height = H;
});
</script>
</body>
</html>
